name: Auto EPG

on:
  push:
    paths:
      - 'a.py'   # Otomatis jalan kalau file ini diedit
      - 'a.txt'  # Otomatis jalan kalau file ini diedit
  schedule:
    - cron: '0 */2 * * *' # Otomatis jalan tiap 2 jam
  workflow_dispatch: # Tombol manual tetap ada

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r a.txt
          playwright install chromium

      - name: Run Script
        run: python a.py

      - name: Push to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add epg-sports.xml
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto EPG Update [skip ci]"
            git push
          fi
